name: Mobile Android E2E

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - ".maestro/**"
      - ".github/workflows/mobile-android-e2e.yml"
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - ".maestro/**"
      - ".github/workflows/mobile-android-e2e.yml"

permissions:
  contents: read

concurrency:
  group: mobile-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  maestro-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: npm ci
      - name: Build x86_64 release APK for emulator
        working-directory: apps/mobile
        env:
          CI: "1"
          EXPO_PUBLIC_API_BASE_URL: https://imml0cczh7.execute-api.us-east-1.amazonaws.com
          EXPO_PUBLIC_ENABLE_EVALUATION_MODE: "true"
          ANDROID_ABI: x86_64
        run: npm run build:android:apk
      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Enable KVM hardware acceleration
        run: |
          test -e /dev/kvm
          sudo chmod 0666 /dev/kvm
      - name: Run Evaluation Workspace journey
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            adb install -r apps/mobile/android/app/build/outputs/apk/release/app-release.apk
            $HOME/.maestro/bin/maestro test .maestro/evaluation-workspace.yaml
      - name: Upload APK and Maestro diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inspectiq-android-evaluation
          if-no-files-found: warn
          retention-days: 14
          path: |
            apps/mobile/android/app/build/outputs/apk/release/app-release.apk
            ~/.maestro/tests/**

  internal-arm64-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: npm ci
      - name: Build arm64 internal-distribution APK
        working-directory: apps/mobile
        env:
          CI: "1"
          EXPO_PUBLIC_API_BASE_URL: https://imml0cczh7.execute-api.us-east-1.amazonaws.com
          EXPO_PUBLIC_ENABLE_EVALUATION_MODE: "true"
          ANDROID_ABI: arm64-v8a
        run: npm run build:android:apk
      - name: Upload installable arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: inspectiq-android-arm64
          retention-days: 14
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
