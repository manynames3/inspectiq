name: Live Uploaded Photo Proof

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Deployed InspectIQ API URL"
        required: true
        default: "https://imml0cczh7.execute-api.us-east-1.amazonaws.com"

permissions:
  contents: read

jobs:
  live-upload-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Decode live photo set
        env:
          LIVE_PHOTO_SET_ZIP_BASE64: ${{ secrets.LIVE_PHOTO_SET_ZIP_BASE64 }}
        run: |
          test -n "$LIVE_PHOTO_SET_ZIP_BASE64" || (echo "::error::LIVE_PHOTO_SET_ZIP_BASE64 secret is required. Store a zip containing front/rear/driver/passenger/interior/engine/odometer/vin photos." && exit 1)
          mkdir -p /tmp/inspectiq-live-photos
          printf "%s" "$LIVE_PHOTO_SET_ZIP_BASE64" | base64 -d > /tmp/inspectiq-live-photos.zip
          unzip -q /tmp/inspectiq-live-photos.zip -d /tmp/inspectiq-live-photos
      - name: Run deployed uploaded-photo proof
        run: npm run test:live-upload
        env:
          LIVE_API_BASE_URL: ${{ inputs.api_base_url }}
          LIVE_ID_TOKEN: ${{ secrets.LIVE_ID_TOKEN }}
          LIVE_REVIEWER_TOKEN: ${{ secrets.LIVE_REVIEWER_TOKEN }}
          LIVE_PHOTO_DIR: /tmp/inspectiq-live-photos
