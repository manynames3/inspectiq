name: Deploy Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Check Cloudflare credentials
        id: cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets are missing; skipping Pages deployment."
          fi

      - uses: actions/setup-node@v4
        if: steps.cf.outputs.available == 'true'
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        if: steps.cf.outputs.available == 'true'
      - run: npm run lint
        if: steps.cf.outputs.available == 'true'
      - run: npm run typecheck
        if: steps.cf.outputs.available == 'true'
      - run: npm test
        if: steps.cf.outputs.available == 'true'
      - run: npm run build
        if: steps.cf.outputs.available == 'true'

      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.available == 'true'
        run: npx wrangler pages deploy apps/web/dist --project-name=inspectiq --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
