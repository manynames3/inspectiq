name: Deploy Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      production:
        description: Deploy the selected ref to the production Pages branch
        required: true
        type: boolean
        default: false
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Check Cloudflare credentials
        id: cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets are missing; skipping Pages deployment."
          fi

      - uses: actions/setup-node@v4
        if: steps.cf.outputs.available == 'true'
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        if: steps.cf.outputs.available == 'true'
      - run: make verify-fast
        if: steps.cf.outputs.available == 'true'
      - run: npm run lint
        if: steps.cf.outputs.available == 'true'
      - run: npm run eval:vision
        if: steps.cf.outputs.available == 'true'
      - name: Build web app for AWS API
        if: steps.cf.outputs.available == 'true'
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}
          VITE_AUTH_MODE: oidc
          VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN || secrets.VITE_COGNITO_DOMAIN }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID || secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REDIRECT_URI: ${{ vars.VITE_COGNITO_REDIRECT_URI || secrets.VITE_COGNITO_REDIRECT_URI }}
          VITE_COGNITO_LOGOUT_URI: ${{ vars.VITE_COGNITO_LOGOUT_URI || secrets.VITE_COGNITO_LOGOUT_URI }}
          VITE_ENABLE_EVALUATION_MODE: ${{ vars.VITE_ENABLE_EVALUATION_MODE || 'true' }}
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "VITE_API_BASE_URL repository variable or secret is required for Pages deployment."
            exit 1
          fi
          if [ -z "$VITE_COGNITO_DOMAIN" ] || [ -z "$VITE_COGNITO_CLIENT_ID" ] || [ -z "$VITE_COGNITO_REDIRECT_URI" ] || [ -z "$VITE_COGNITO_LOGOUT_URI" ]; then
            echo "Cognito VITE_* repository variables or secrets are required for authenticated Pages deployment."
            exit 1
          fi
          npm run build -w @inspectiq/shared
          npm run build -w @inspectiq/api
          npm run build -w @inspectiq/web

      - name: Resolve Cloudflare Pages branch
        if: steps.cf.outputs.available == 'true'
        id: pages
        env:
          DEPLOY_PRODUCTION: ${{ inputs.production }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ] || [ "$DEPLOY_PRODUCTION" = "true" ]; then
            echo "branch=main" >> "$GITHUB_OUTPUT"
          else
            echo "branch=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.available == 'true'
        working-directory: apps/web
        run: npx wrangler pages deploy dist --project-name=inspectiq --branch="${{ steps.pages.outputs.branch }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
