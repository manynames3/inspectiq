name: InspectIQ CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Fast verification
        run: make verify-fast
      - run: npm run lint
      - run: npm run eval:vision
      - run: npm run build
      - run: npm run build:lambda

  e2e-local:
    runs-on: ubuntu-latest
    needs: node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
      - run: npm ci
      - name: Run browser E2E
        run: make e2e-local
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
      - name: Print local app logs on failure
        if: failure()
        run: cat /tmp/inspectiq-dev.log

  grading-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/grading-python/requirements.txt
      - run: make verify-grading

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: hashicorp/setup-terraform@v3
      - run: npm ci
      - run: npm run build -w @inspectiq/shared
      - run: npm run build:lambda
      - run: make terraform-validate
