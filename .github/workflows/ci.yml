name: InspectIQ CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Fast verification
        run: make verify-fast
      - run: npm run lint
      - run: npm run eval:vision
      - run: npm run build
      - run: npm run build:lambda

  e2e-local:
    runs-on: ubuntu-latest
    needs: node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
      - run: npm ci
      - name: Run browser E2E
        run: make e2e-local
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
      - name: Print local app logs on failure
        if: failure()
        run: cat /tmp/inspectiq-dev.log

  visual-regression:
    runs-on: ubuntu-latest
    needs: node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
      - run: npm ci
      - name: Run responsive screenshot and accessibility regression
        run: make screenshots-local
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
      - name: Upload screenshots and pixel diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inspectiq-visual-regression
          retention-days: 14
          if-no-files-found: warn
          path: output/screenshots/**
      - name: Print local app logs on failure
        if: failure()
        run: cat /tmp/inspectiq-dev.log

  grading-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/grading-python/requirements.txt
      - run: make verify-grading

  operations-projector:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/operations-projector/requirements.txt
      - run: make verify-projector

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: inspectiq
          POSTGRES_PASSWORD: inspectiq
          POSTGRES_DB: inspectiq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inspectiq -d inspectiq_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w @inspectiq/shared
      - name: Verify migrations, transactions, and optimistic conflicts
        run: npm run test:postgres
        env:
          TEST_DATABASE_URL: postgresql://inspectiq:inspectiq@localhost:5432/inspectiq_test

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: React Native type and component verification
        run: npm run test:mobile
      - name: Validate Expo native configuration
        working-directory: apps/mobile
        run: npx expo config --type public

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: hashicorp/setup-terraform@v3
      - run: npm ci
      - run: npm run build -w @inspectiq/shared
      - run: npm run build:lambda
      - run: npm run build:projector
      - run: make terraform-validate
