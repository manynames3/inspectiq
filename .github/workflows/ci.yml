name: InspectIQ CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run build:lambda

  e2e-local:
    runs-on: ubuntu-latest
    needs: node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
      - run: npm ci
      - name: Start local app
        run: |
          npm run dev > /tmp/inspectiq-dev.log 2>&1 &
          echo "$!" > /tmp/inspectiq-dev.pid
      - name: Wait for local API and web
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:4000/api/health >/dev/null && curl -fsS http://localhost:5173 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/inspectiq-dev.log
          exit 1
      - name: Run browser E2E
        run: npm run test:e2e
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
      - name: Stop local app
        if: always()
        run: |
          if [ -f /tmp/inspectiq-dev.pid ]; then
            kill "$(cat /tmp/inspectiq-dev.pid)" 2>/dev/null || true
          fi
      - name: Print local app logs on failure
        if: failure()
        run: cat /tmp/inspectiq-dev.log

  grading-java:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/grading-java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn test

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: hashicorp/setup-terraform@v3
      - run: npm ci
      - run: npm run build -w @inspectiq/shared
      - run: npm run build:lambda
      - run: terraform -chdir=infra/terraform init -backend=false
      - run: terraform -chdir=infra/terraform validate
