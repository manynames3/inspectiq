appId: com.aidenrhaa.inspectiq
---
- launchApp:
    clearState: true
- tapOn:
    text: "Wait"
    optional: true
- assertVisible: "InspectIQ"
- assertVisible: "Open Evaluation Workspace"
- tapOn: "Open Evaluation Workspace"
- assertVisible: "Review queue"
- assertVisible: "Evaluation"
- tapOn:
    text: "Wait"
    optional: true
- assertVisible: "InspectIQ"
- tapOn:
    text: "^Review$"
- assertVisible: "Review queue"
- tapOn:
    text: "^Damage$"
- assertVisible: "Confirmed damage"
- tapOn:
    text: "^Reports$"
- assertVisible: "Condition reports"
- tapOn:
    text: "^Sign out$"
- assertVisible: "Open Evaluation Workspace"
